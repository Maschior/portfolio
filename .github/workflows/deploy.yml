name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: terraform

env:
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: sa-east-1

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Wait for infrastructure to be ready
        run: |
          echo "Waiting for infrastructure to be ready..."
          sleep 150

      - name: Post-Deploy Health Check
        run: |
          PUBLIC_IP=$(terraform output -raw public_ip)
          echo "Public IP is: $PUBLIC_IP"
          
          # --- 1. Aguarda o Agente do SSM ficar Online na AWS ---
          echo "Waiting for SSM Agent to be Online..."
          ssm_success=false
          attempt=1
          while [ $attempt -le 30 ]; do
            echo "Checking SSM PingStatus (Attempt $attempt of 30)..."
            INSTANCE_ID=$(aws ssm describe-instance-information \
              --filters "Key=tag:Name,Values=portfolio-instance" \
              --query "InstanceInformationList[?PingStatus=='Online'].InstanceId" \
              --output text --region sa-east-1)
            
            if [ -n "$INSTANCE_ID" ]; then
              echo "SSM Agent is Online! Instance ID: $INSTANCE_ID"
              ssm_success=true
              break
            else
              echo "SSM Agent not online yet. Retrying in 10s..."
            fi
            attempt=$((attempt+1))
            sleep 10
          done
          
          if [ "$ssm_success" = false ]; then
            echo "ERROR: SSM Agent did not come online within 5 minutes."
            exit 1
          fi
          
          # --- 2. Aguarda o Nginx e o Ansible terminarem de configurar o site ---
          echo "Waiting for web server to be up and serving..."
          web_success=false
          attempt=1
          while [ $attempt -le 30 ]; do
            echo "Attempt $attempt of 30..."
            status_code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "http://$PUBLIC_IP/" || echo "000")
            
            if [ "$status_code" -eq 200 ]; then
              echo "Web server is online! HTTP Status 200"
              content=$(curl -s "http://$PUBLIC_IP/")
              if echo "$content" | grep -q "Portfolio Maschior"; then
                echo "Health check verification passed!"
                web_success=true
                break
              else
                echo "WARNING: Web server is serving, but placeholder content was not found."
              fi
            else
              echo "Web server not ready yet (HTTP Status $status_code). Retrying in 10s..."
            fi
            
            attempt=$((attempt+1))
            sleep 10
          done
          
          if [ "$web_success" = false ]; then
            echo "ERROR: Health check failed. Web server did not respond correctly within 5 minutes."
            exit 1
          fi
      
      - name: Frontend deployment trigger
        if: success()
        run: |
          echo "Triggering frontend deployment..."
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_FRONTEND_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Maschior/portfolio-webapp/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'

