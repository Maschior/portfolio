---
- name: Provision Portfolio Server
  hosts: localhost
  become: true
  tasks:
    - name: Ensure Nginx is installed
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Install Node.js and NPM
      apt:
        name:
          - nodejs
          - npm
        state: present

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes

    - name: Create portfolio web directory
      file:
        path: /var/www/portfolio
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Create a lightweight node server placeholder
      copy:
        dest: /var/www/portfolio/server.js
        owner: www-data
        group: www-data
        mode: '0644'
        content: |
          const http = require('http');
          const server = http.createServer((req, res) => {
            res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
            res.end('<h1>Portfolio Maschior</h1><p>Pronto para implantação da aplicação Next.js.</p>');
          });
          server.listen(3000, '127.0.0.1', () => {
            console.log('Placeholder running on port 3000');
          });

    - name: Check if application is already running on PM2
      command: pm2 describe portfolio
      register: pm2_check
      ignore_errors: yes
      changed_when: false

    - name: Start placeholder application on PM2
      command: pm2 start server.js --name "portfolio"
      args:
        chdir: /var/www/portfolio
      when: pm2_check.rc != 0

    - name: Configure PM2 to start on boot
      command: env PATH=$PATH:/usr/bin pm2 startup systemd -u root --hp /root
      register: pm2_startup_output
      changed_when: "'setup' in pm2_startup_output.stdout"

    - name: Save PM2 process list
      command: pm2 save
      changed_when: yes

    - name: Configure Nginx as a reverse proxy
      copy:
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: '0644'
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              server_name _;

              # Servir arquivos estáticos do public/ diretamente pelo Nginx
              location ~* ^/(.+\.(?:png|jpg|jpeg|gif|ico|svg|webp|avif|pdf|woff2?|ttf|eot))$ {
                  root /var/www/portfolio/portfolio-webapp/public;
                  try_files /$1 @nextjs;
                  expires 30d;
                  add_header Cache-Control "public, immutable";
              }

              # Servir assets do Next.js (_next/static) diretamente
              location /_next/static {
                  alias /var/www/portfolio/portfolio-webapp/.next/static;
                  expires 365d;
                  add_header Cache-Control "public, immutable";
              }

              # Tudo o resto vai para o Next.js
              location @nextjs {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }
      notify: Restart Nginx

  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
        enabled: true
